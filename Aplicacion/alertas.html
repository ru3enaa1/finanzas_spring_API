<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pfm - Alertas y Recordatorios</title>
  <link rel="stylesheet" href="alertas.css">
</head>
<body>
  <div class="dashboard">
    <!-- Sidebar -->
    <aside class="sidebar">
      <a href="dashboard.html">
        <div class="logo">
          <img src="C:\Users\RUBEN AGUDELO\OneDrive\Escritorio\Documentos\Aplicacion Sena\Analisis y desarrollo de software\software financiero visual\imagenes\2.png" alt="Pfm Logo">
        </div>
      </a>
      <nav class="menu">
        <a href="creacion-cuentas.html">
          <span class="icon">🏦</span> Creación de cuentas
        </a>
        <a href="transacciones.html">
          <span class="icon">💸</span> Transacciones
        </a>
        <a href="presupuestos.html">
          <span class="icon">💰</span> Presupuestos
        </a>
        <a href="informes.html">
          <span class="icon">📄</span> Informes

        <a href="alertas.html" class="active">
          <span class="icon">🔔</span> Alertas y recordatorios
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Top bar -->
      <header class="topbar">
        <div class="progress">
          <span class="piggy">🐷</span>
          <span class="progress-text">1%</span>
        </div>
        <div class="user">
          <span>Usuario</span>
        </div>
      </header>

      <!-- Reminder Form -->
      <section class="form-box">
        <h2>Crea un recordatorio</h2>
        <form>
          <label>
            <span>Fecha</span>
            <input type="date" required>
          </label>

          <label>
            <span>Categoría</span>
            <input type="text" placeholder="Digite" required>
          </label>

          <label>
            <span>Priorización</span>
            <select required>
              <option value="">Elija</option>
              <option value="alta">Alta</option>
              <option value="media">Media</option>
              <option value="baja">Baja</option>
            </select>
          </label>

          <button type="submit">Guardar</button>
        </form>
      </section>
    </main>
  </div>
</body>
