<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pfm - Transacciones</title>
  <link rel="stylesheet" href="transacciones.css">
</head>
<body>
  <div class="dashboard">
    <!-- Sidebar -->
    <aside class="sidebar">
        <a href="dashboard.html">
      <div class="logo">
        <img src="C:\Users\RUBEN AGUDELO\OneDrive\Escritorio\Documentos\Aplicacion Sena\Analisis y desarrollo de software\software financiero visual\imagenes\2.png" alt="Pfm Logo">
      </div>
      </a>
      <nav class="menu">
        <a href="creacion-cuentas.html">
          <span class="icon">🏦</span> Creacion de cuentas
        </a>
        <a href="transacciones.html" class="active">
          <span class="icon">💸</span> Transacciones
        </a>
        <a href="presupuestos.html">
          <span class="icon">💰</span> Presupuestos
        </a>
        <a href="informes.html">
          <span class="icon">📄</span> Informes
        </a>
        <a href="alertas.html">
          <span class="icon">🔔</span> Alertas y recordatorios
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Top bar -->
      <header class="topbar">
        <div class="progress">
          <span class="piggy">🐷</span>
          <span class="progress-text">1%</span>
        </div>
        <div class="user">
          <span>Usuario</span>
        </div>
      </header>

      <!-- Transaction Form -->
      <section class="form-box">
        <h2>Registrar transacción</h2>
        <form>
          <label>
            <span>Tipo de transacción</span>
            <select>
              <option>Elija</option>
              <option>Ingreso</option>
              <option>Gasto</option>
            </select>
          </label>

          <label>
            <span>Categoría</span>
            <select>
              <option>Elija</option>
              <option>Alimentación</option>
              <option>Transporte</option>
              <option>Entretenimiento</option>
              <option>Otros</option>
            </select>
          </label>

          <label>
            <span>Fecha de transacción</span>
            <input type="date">
          </label>

          <label>
            <span>Monto de transacción</span>
            <input type="number" placeholder="$">
          </label>

          <label>
            <span>Añadir a cual presupuesto</span>
            <select>
              <option>Elegir</option>
              <option>Mensual</option>
              <option>Vacaciones</option>
              <option>Ahorros</option>
            </select>
          </label>

          <button type="submit">Guardar</button>
        </form>
      </section>
    </main>
  </div>
</body>
</html>
