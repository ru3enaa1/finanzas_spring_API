<!DOCTYPE html>

</head>
<body>

        <div class="logo">

        <!-- Login Form -->
        <div class="login-box">
            <h2>Iniciar sesión</h2>

                <button type="submit">Iniciar sesión</button>
            </form>
        </div>
    </div>
</body>
