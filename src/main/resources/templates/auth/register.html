<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de cuenta</title>
    <link rel="stylesheet" th:href="@{/css/register.css}">
</head>
<body>
<div class="corner-glow top-left"></div>
<div class="corner-glow bottom-right"></div>

<div class="logo">
    <a th:href="@{/}">
        <img th:src="@{/img/1.png}" alt="Logo Pfm">
    </a>
</div>

<div class="container">
    <div class="illustration">
        <img th:src="@{/img/Imagen.png}" alt="Registro Pfm">
    </div>

    <div class="form-container">
        <h2>Registro de cuenta</h2>
        <p>Ya tienes cuenta? <a th:href="@{/auth/login}">Inicia sesion</a></p>

        <form th:action="@{/auth/register}" th:object="${usuario}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="input-group" th:classappend="${#fields.hasErrors('nombre')} ? ' has-error'">
                <input type="text" th:field="*{nombre}" placeholder="Nombre" required>
                <div class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
            </div>
            <div class="input-group" th:classappend="${#fields.hasErrors('apellido')} ? ' has-error'">
                <input type="text" th:field="*{apellido}" placeholder="Apellido">
                <div class="error" th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}"></div>
            </div>
            <div class="input-group" th:classappend="${#fields.hasErrors('correo')} ? ' has-error'">
                <input type="email" th:field="*{correo}" placeholder="Correo" required>
                <div class="error" th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}"></div>
            </div>
            <div class="input-group" th:classappend="${#fields.hasErrors('contrasenaPlano')} ? ' has-error'">
                <input type="password" th:field="*{contrasenaPlano}" placeholder="Contrasena" required>
                <div class="error" th:if="${#fields.hasErrors('contrasenaPlano')}" th:errors="*{contrasenaPlano}"></div>
            </div>
            <button type="submit">Registrarse</button>
        </form>
    </div>
</div>
</body>
</html>
