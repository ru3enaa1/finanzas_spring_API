<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesion</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="container">
    <div class="logo">
        <a th:href="@{/}">
            <img th:src="@{/img/2.png}" alt="Logo Pfm">
        </a>
    </div>

    <div class="login-box">
        <h2>Iniciar sesion</h2>
        <p>Ingresa tus datos para entrar a tu cuenta</p>

        <div class="alert success" th:if="${mensajeExito != null}" th:text="${mensajeExito}"></div>
        <div class="alert error" th:if="${param.error != null}">Correo o contrasena incorrecta</div>
        <div class="alert info" th:if="${param.logout != null}">Sesion cerrada correctamente</div>

        <form th:action="@{/auth/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="input-group">
                <input type="email" name="correo" placeholder="Correo" required autofocus>
            </div>
            <div class="input-group">
                <input type="password" name="contrasena" placeholder="Contrasena" required>
            </div>
            <div class="actions">
                <label class="remember"><input type="checkbox" name="recordar"> Recordarme</label>
                <a href="#" class="forgot-password">Olvidaste tu contrasena?</a>
            </div>
            <button type="submit">Iniciar sesion</button>
        </form>

        <p class="alt-action">No tienes cuenta? <a th:href="@{/auth/register}">Registrate</a></p>
    </div>
</div>
</body>
</html>
