<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuentas - Pfm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/creacion-cuentas.css}">
</head>
<body>
<div class="app-layout">

    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

    <div class="main-wrapper">
        <header th:replace="~{fragments/topbar :: topbar}"></header>

        <div class="content-scroll">

            <!-- Mensajes de estado -->
            <div class="alert success" th:if="${mensajeExito != null}" th:text="${mensajeExito}"></div>
            <div class="alert error"   th:if="${mensajeError != null}" th:text="${mensajeError}"></div>

            <!-- Header: acciones + balance -->
            <div class="accounts-header">
                <div class="header-actions">
                    <button class="btn-icon"
                            id="btnNueva"
                            th:disabled="${cuentasLlenas}"
                            onclick="abrirCrear()"
                            title="Nueva cuenta">+</button>
                    <button class="btn-icon"
                            id="btnEditar"
                            th:disabled="${#lists.isEmpty(cuentas)}"
                            onclick="toggleEditMode()"
                            title="Editar cuentas">
                        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2.2"
                             stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                    </button>
                </div>
                <div class="header-balance">
                    <div class="balance-info">
                        <span class="balance-account-name" th:text="${cuentaActivaNombre}"></span>
                        <div class="balance-amount">
                            <span class="balance-symbol" th:text="${simboloMoneda}">$</span>
                            <span class="balance-number"
                                  th:text="${#numbers.formatDecimal(saldoConvertido, 1, 'COMMA', 2, 'POINT')}">0,00</span>
                        </div>
                    </div>
                    <span class="balance-moneda" th:text="${monedaActual}">COP</span>
                </div>
            </div>

            <!-- Grid de cuentas -->
            <div class="accounts-grid" th:if="${!#lists.isEmpty(cuentas)}">
                <article class="account-card"
                         th:each="c : ${cuentas}"
                         th:classappend="'card-' + (${coloresPorTipo[c.tipo] ?: 'default'}) + (${c.id == cuentaActivaId} ? ' card-activa' : '')"
                         th:data-id="${c.id}"
                         th:data-nombre="${c.nombre}"
                         th:data-tipo="${c.tipo}"
                         th:data-saldo="${c.saldo}">

                    <div class="card-bar-chart" th:with="pct=${porcentajes[c.id] ?: 40.0}">
                        <div class="bar bar-side" th:style="|height: ${pct * 0.55}%|"></div>
                        <div class="bar bar-main"  th:style="|height: ${pct}%|"></div>
                        <div class="bar bar-side" th:style="|height: ${pct * 0.35}%|"></div>
                    </div>

                    <div class="card-saldo">
                        <span class="saldo-label">Saldo</span>
                        <strong class="saldo-amount"
                                th:text="${#numbers.formatDecimal(c.saldo, 1, 'COMMA', 2, 'POINT')}">0,00</strong>
                    </div>

                    <div class="card-label">
                        <span class="card-nombre" th:text="${c.nombre}">Cuenta</span>
                        <span class="card-tipo"   th:text="${c.tipo}">Tipo</span>
                    </div>

                    <a class="card-link-txn" th:href="@{/transacciones}">
                        Ver movimientos
                        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2.5"
                             stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"/>
                            <polyline points="12 5 19 12 12 19"/>
                        </svg>
                    </a>

                    <div class="card-edit-actions">
                        <button class="btn-card-edit" type="button"
                                onclick="abrirEditar(this)">Editar</button>
                        <form th:action="@{'/cuentas/' + ${c.id} + '/eliminar'}" method="post"
                              style="flex:1"
                              onsubmit="return confirm('¿Deseas eliminar esta cuenta?');">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn-card-delete">Eliminar</button>
                        </form>
                    </div>
                </article>
            </div>

            <!-- Total de todas las cuentas -->
            <div class="total-section" th:if="${!#lists.isEmpty(cuentas)}">
                <span class="total-label">Total en todas las cuentas</span>
                <span class="total-amount">
                    <span th:text="${monedaActual == 'EUR'} ? '€' : '$'"></span><span th:text="${#numbers.formatDecimal(saldoTotalConvertido, 1, 'COMMA', 2, 'POINT')}"></span>
                    <span class="total-moneda" th:text="${monedaActual}"></span>
                </span>
            </div>

            <p class="empty-msg" th:if="${#lists.isEmpty(cuentas)}">
                Aun no tienes cuentas registradas. Usa el boton <strong>+</strong> para crear una.
            </p>

        </div>
    </div>

</div>

<!-- Modal crear / editar -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box" onclick="event.stopPropagation()">
        <h3 class="modal-title" id="modalTitulo">Nueva cuenta</h3>

        <form id="frmCuenta" th:action="@{/cuentas}" th:object="${cuenta}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="modal-fields">

                <label>
                    Nombre de referencia
                    <input type="text" th:field="*{nombre}"
                           placeholder="Ej: Nomina Bancolombia"
                           maxlength="60" required autocomplete="off">
                    <span class="field-error"
                          th:if="${#fields.hasErrors('nombre')}"
                          th:errors="*{nombre}"></span>
                </label>

                <label>
                    Tipo de cuenta
                    <select th:field="*{tipo}" required>
                        <option value="" disabled>Elija un tipo</option>
                        <option th:each="t : ${tiposCuenta}"
                                th:value="${t}"
                                th:text="${t}"></option>
                    </select>
                    <span class="field-error"
                          th:if="${#fields.hasErrors('tipo')}"
                          th:errors="*{tipo}"></span>
                </label>

                <label>
                    Saldo inicial
                    <div class="input-prefix">
                        <span>$</span>
                        <input type="number" th:field="*{saldo}"
                               step="0.01" min="0" placeholder="0.00" required>
                    </div>
                    <span class="field-error"
                          th:if="${#fields.hasErrors('saldo')}"
                          th:errors="*{saldo}"></span>
                </label>

            </div>

            <div class="modal-actions">
                <button type="button" class="btn-modal-cancel" onclick="cerrarModal()">Cancelar</button>
                <button type="submit" class="btn-modal-save">Guardar</button>
            </div>
        </form>
    </div>
</div>

<script th:inline="javascript">
    var BASE_URL    = /*[[@{/cuentas}]]*/ '/cuentas';
    var hasErrors   = /*[[${formConErrores ?: false}]]*/ false;
    var editMode    = false;

    // Abrir modal en modo creacion
    function abrirCrear() {
        document.getElementById('modalTitulo').textContent = 'Nueva cuenta';
        document.getElementById('frmCuenta').action = BASE_URL;
        document.getElementById('nombre').value = '';
        document.getElementById('tipo').value   = '';
        document.getElementById('saldo').value  = '';
        document.getElementById('modalOverlay').classList.add('active');
    }

    // Abrir modal en modo edicion (pre-rellena desde data-* de la tarjeta)
    function abrirEditar(btn) {
        var card = btn.closest('.account-card');
        document.getElementById('modalTitulo').textContent = 'Editar cuenta';
        document.getElementById('frmCuenta').action = BASE_URL + '/' + card.dataset.id + '/actualizar';
        document.getElementById('nombre').value = card.dataset.nombre;
        document.getElementById('tipo').value   = card.dataset.tipo;
        document.getElementById('saldo').value  = card.dataset.saldo;
        document.getElementById('modalOverlay').classList.add('active');
    }

    // Cerrar modal
    function cerrarModal() {
        document.getElementById('modalOverlay').classList.remove('active');
    }

    document.getElementById('modalOverlay').addEventListener('click', function (e) {
        if (e.target === this) cerrarModal();
    });

    // Modo edicion: muestra acciones en cada tarjeta
    function toggleEditMode() {
        editMode = !editMode;
        document.getElementById('btnEditar').classList.toggle('active', editMode);
        document.querySelectorAll('.card-edit-actions').forEach(function (el) {
            el.classList.toggle('visible', editMode);
        });
    }

    // Si hubo errores de validacion, reabrir el modal automaticamente
    if (hasErrors) {
        document.getElementById('modalOverlay').classList.add('active');
    }
</script>

</body>
</html>
