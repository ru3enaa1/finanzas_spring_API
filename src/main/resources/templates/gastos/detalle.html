<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${'Detalle - ' + gasto.nombre}">Detalle gasto fijo</title>
    <link rel="stylesheet" th:href="@{/css/alertas.css}">
</head>
<body>
<div class="dashboard">
    <aside class="sidebar">
        <div class="logo">
            <a th:href="@{/dashboard}">
                <img th:src="@{/img/2.png}" alt="Pfm Logo">
            </a>
        </div>
        <nav class="menu">
            <a th:href="@{/dashboard}">
                <span class="icon">&#x1F4C8;</span> Tablero
            </a>
            <a th:href="@{/cuentas}">
                <span class="icon">&#x1F4B3;</span> Cuentas
            </a>
            <a th:href="@{/gastos-fijos}" class="active">
                <span class="icon">&#x1F4B8;</span> Gastos fijos
            </a>
            <a th:href="@{/transacciones}">
                <span class="icon">&#x1F4B0;</span> Transacciones
            </a>
            <a th:href="@{/logout}">
                <span class="icon">&#x1F512;</span> Cerrar sesion
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <h1 th:text="${gasto.nombre}"></h1>
            <div class="user">
                <span th:text="${usuarioActual}"></span>
            </div>
        </header>

        <section class="details">
            <p><strong>Categoria:</strong> <span th:text="${gasto.categoria != null ? gasto.categoria : 'N/A'}"></span></p>
            <p><strong>Monto estimado:</strong> <span th:text="${#numbers.formatDecimal(gasto.montoEstimado, 1, 'COMMA', 2, 'POINT')}"></span></p>
            <p th:if="${gasto.diaVencimiento != null}"><strong>Dia de vencimiento:</strong> <span th:text="${gasto.diaVencimiento}"></span></p>
            <p th:if="${gasto.descripcion != null}" th:text="${gasto.descripcion}"></p>
        </section>

        <section class="form-section">
            <h2>Registrar pago mensual</h2>
            <form th:action="@{'/gastos-fijos/' + ${gasto.id} + '/registrar-pago'}" method="post" class="form-grid">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label>
                    Anio
                    <input type="number" name="anio" min="2000" th:value="${#dates.year(#dates.createNow())}" required>
                </label>
                <label>
                    Mes
                    <input type="number" name="mes" min="1" max="12" th:value="${#dates.month(#dates.createNow())}" required>
                </label>
                <label>
                    Monto pagado
                    <input type="number" name="montoPagado" step="0.01" min="0">
                </label>
                <label class="checkbox">
                    <input type="checkbox" name="pagado"> Marcar como pagado
                </label>
                <div class="form-actions">
                    <button type="submit">Guardar registro</button>
                </div>
            </form>
        </section>

        <section class="list-section">
            <h2>Historial</h2>
            <table class="records" th:if="${!#lists.isEmpty(registros)}">
                <thead>
                <tr>
                    <th>Anio</th>
                    <th>Mes</th>
                    <th>Estado</th>
                    <th>Monto pagado</th>
                    <th>Fecha pago</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="registroItem : ${registros}">
                    <td th:text="${registroItem.anio}"></td>
                    <td th:text="${registroItem.mes}"></td>
                    <td th:text="${registroItem.pagado ? 'Pagado' : 'Pendiente'}"></td>
                    <td th:text="${registroItem.montoPagado != null ? #numbers.formatDecimal(registroItem.montoPagado, 1, 'COMMA', 2, 'POINT') : '--'}"></td>
                    <td th:text="${registroItem.fechaPago != null ? #temporals.format(registroItem.fechaPago, 'dd/MM/yyyy') : '--'}"></td>
                </tr>
                </tbody>
            </table>
            <p th:if="${#lists.isEmpty(registros)}">No hay registros para este gasto fijo.</p>
        </section>

        <div class="back-link">
            <a th:href="@{/gastos-fijos}">Volver a la lista</a>
        </div>
    </main>
</div>
</body>
</html>
