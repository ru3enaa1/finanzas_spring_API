<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>

<aside th:fragment="sidebar" class="sidebar">

    <div class="sidebar-brand">
        <a th:href="@{/dashboard}" class="brand-link">
            <img th:src="@{/img/2.png}" alt="Pfm" class="brand-logo">
        </a>
    </div>

    <nav class="sidebar-nav">

        <!-- Panel de usuario -->
        <a th:href="@{/dashboard}"
           class="nav-item"
           th:classappend="${activePath == '/dashboard'} ? ' active' : ''">
            <span class="nav-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
            </span>
            <span class="nav-label">Panel de usuario</span>
        </a>

        <!-- Creación de cuentas -->
        <a th:href="@{/cuentas}"
           class="nav-item"
           th:classappend="${#strings.startsWith(activePath, '/cuentas')} ? ' active' : ''">
            <span class="nav-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="9" width="18" height="12" rx="2"/>
                    <path d="M3 9l9-6 9 6"/>
                    <line x1="9" y1="9" x2="9" y2="21"/>
                    <line x1="15" y1="9" x2="15" y2="21"/>
                </svg>
            </span>
            <span class="nav-label">Creación de cuentas</span>
        </a>

        <!-- Transacciones -->
        <a th:href="@{/transacciones}"
           class="nav-item"
           th:classappend="${#strings.startsWith(activePath, '/transacciones')} ? ' active' : ''">
            <span class="nav-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="5" width="20" height="14" rx="2"/>
                    <line x1="2" y1="10" x2="22" y2="10"/>
                </svg>
            </span>
            <span class="nav-label">Transacciones</span>
        </a>

        <!-- Presupuestos -->
        <a th:href="@{/presupuestos}"
           class="nav-item"
           th:classappend="${#strings.startsWith(activePath, '/presupuestos')} ? ' active' : ''">
            <span class="nav-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="1" x2="12" y2="23"/>
                    <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
            </span>
            <span class="nav-label">Presupuestos</span>
        </a>

        <!-- Fondos de ahorro -->
        <a th:href="@{/fondos}"
           class="nav-item"
           th:classappend="${#strings.startsWith(activePath, '/fondos')} ? ' active' : ''">
            <span class="nav-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                </svg>
            </span>
            <span class="nav-label">Fondos de ahorro</span>
        </a>

        <!-- Informes -->
        <a th:href="@{/informes}"
           class="nav-item"
           th:classappend="${#strings.startsWith(activePath, '/informes')} ? ' active' : ''">
            <span class="nav-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
            </span>
            <span class="nav-label">Informes</span>
        </a>

        <!-- Alertas y recordatorios -->
        <a th:href="@{/alertas}"
           class="nav-item"
           th:classappend="${#strings.startsWith(activePath, '/alertas')} ? ' active' : ''">
            <span class="nav-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
            </span>
            <span class="nav-label">Alertas y recordatorios</span>
        </a>

    </nav>
</aside>

</body>
</html>
