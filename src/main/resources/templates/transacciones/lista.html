<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transacciones - Pfm</title>
    <link rel="stylesheet" th:href="@{/css/transacciones.css}">
</head>
<body>
<div class="dashboard">
    <aside class="sidebar">
        <div class="logo">
            <a th:href="@{/dashboard}">
                <img th:src="@{/img/2.png}" alt="Pfm Logo">
            </a>
        </div>
        <nav class="menu">
            <a th:href="@{/dashboard}">
                <span class="icon">&#x1F4C8;</span> Tablero
            </a>
            <a th:href="@{/cuentas}">
                <span class="icon">&#x1F4B3;</span> Cuentas
            </a>
            <a th:href="@{/gastos-fijos}">
                <span class="icon">&#x1F4B8;</span> Gastos fijos
            </a>
            <a th:href="@{/transacciones}" class="active">
                <span class="icon">&#x1F4B0;</span> Transacciones
            </a>
            <a th:href="@{/logout}">
                <span class="icon">&#x1F512;</span> Cerrar sesion
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <h1>Transacciones</h1>
            <div class="user">
                <span th:text="${#authentication.name}"></span>
            </div>
        </header>

        <section class="form-section">
            <h2>Registrar movimiento</h2>
            <div class="alert success" th:if="${mensajeExito != null}" th:text="${mensajeExito}"></div>
            <div class="alert error" th:if="${mensajeError != null}" th:text="${mensajeError}"></div>

            <form th:action="@{/transacciones}" th:object="${transaccion}" method="post" class="form-grid">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label>
                    Cuenta
                    <select th:field="*{cuenta.id}" required>
                        <option value="" disabled selected>Selecciona una cuenta</option>
                        <option th:each="cuentaItem : ${cuentas}" th:value="${cuentaItem.id}" th:text="${cuentaItem.tipo}"></option>
                    </select>
                    <span class="error" th:if="${#fields.hasErrors('cuenta.id')}" th:errors="*{cuenta.id}"></span>
                </label>
                <label>
                    Tipo
                    <select th:field="*{tipo}" required>
                        <option value="" disabled selected>Selecciona</option>
                        <option th:each="tipoItem : ${tipos}" th:value="${tipoItem}" th:text="${tipoItem}"></option>
                    </select>
                    <span class="error" th:if="${#fields.hasErrors('tipo')}" th:errors="*{tipo}"></span>
                </label>
                <label>
                    Categoria
                    <input type="text" th:field="*{categoria}" placeholder="Ej: Cine" required>
                    <span class="error" th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}"></span>
                </label>
                <label>
                    Fecha
                    <input type="date" th:field="*{fecha}" required>
                    <span class="error" th:if="${#fields.hasErrors('fecha')}" th:errors="*{fecha}"></span>
                </label>
                <label>
                    Monto
                    <input type="number" step="0.01" min="0.01" th:field="*{monto}" required>
                    <span class="error" th:if="${#fields.hasErrors('monto')}" th:errors="*{monto}"></span>
                </label>
                <label class="full">
                    Descripcion
                    <textarea th:field="*{descripcion}" rows="2" placeholder="Opcional"></textarea>
                </label>
                <label class="checkbox">
                    <input type="checkbox" th:field="*{fijo}"> Marcar como gasto fijo
                </label>
                <div class="form-actions">
                    <button type="submit">Guardar</button>
                </div>
            </form>
        </section>

        <section class="list-section">
            <h2>Historial</h2>
            <table class="records" th:if="${!#lists.isEmpty(transacciones)}">
                <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Cuenta</th>
                    <th>Tipo</th>
                    <th>Categoria</th>
                    <th>Monto</th>
                    <th>Descripcion</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="transaccionItem : ${transacciones}">
                    <td th:text="${#temporals.format(transaccionItem.fecha, 'dd/MM/yyyy')}"></td>
                    <td th:text="${transaccionItem.cuenta.tipo}"></td>
                    <td th:text="${transaccionItem.tipo}"></td>
                    <td th:text="${transaccionItem.categoria}"></td>
                    <td th:text="${#numbers.formatDecimal(transaccionItem.monto, 1, 'COMMA', 2, 'POINT')}"></td>
                    <td th:text="${transaccionItem.descripcion}"></td>
                    <td>
                        <form th:action="@{'/transacciones/' + ${transaccionItem.id} + '/eliminar'}" method="post" onsubmit="return confirm('Eliminar transaccion?');">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="danger">Eliminar</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
            <p th:if="${#lists.isEmpty(transacciones)}">No has registrado transacciones aun.</p>
        </section>
    </main>
</div>
</body>
</html>
