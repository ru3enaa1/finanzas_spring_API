<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fondos de ahorro - Pfm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/fondos.css}">
</head>
<body>
<div class="app-layout">

    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

    <div class="main-wrapper">
        <header th:replace="~{fragments/topbar :: topbar}"></header>

        <div class="content-scroll">

            <section class="form-section">
                <h2>Crear fondo</h2>
                <div class="alert success" th:if="${mensajeExito != null}" th:text="${mensajeExito}"></div>
                <div class="alert error" th:if="${mensajeError != null}" th:text="${mensajeError}"></div>

                <form th:action="@{/fondos}" th:object="${fondo}" method="post" class="form-grid">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <label>
                        Nombre
                        <input type="text" th:field="*{nombre}" placeholder="Ej: Vacaciones" required>
                        <span class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span>
                    </label>
                    <label>
                        Monto anual meta
                        <input type="number" step="0.01" min="0.01" th:field="*{montoAnual}" required>
                        <span class="error" th:if="${#fields.hasErrors('montoAnual')}" th:errors="*{montoAnual}"></span>
                    </label>
                    <div class="form-actions">
                        <button type="submit">Guardar</button>
                    </div>
                </form>
            </section>

            <section class="list-section">
                <h2>Mis fondos</h2>
                <div class="cards" th:if="${!#lists.isEmpty(fondosResumen)}">
                    <article class="card" th:each="resumen : ${fondosResumen}">
                        <header>
                            <h3 th:text="${resumen.nombre}"></h3>
                            <span class="status status-active">Meta anual</span>
                        </header>
                        <p>Meta: <strong th:text="${#numbers.formatDecimal(resumen.montoAnual, 1, 'COMMA', 2, 'POINT')}"></strong></p>
                        <p th:text="'Aportes ' + ${resumen.anioEvaluado} + ': ' + ${#numbers.formatDecimal(resumen.totalAportado, 1, 'COMMA', 2, 'POINT')}"></p>
                        <div class="progress-bar">
                            <div class="progress-fill"
                                 th:with="avance=${resumen.porcentajeAvance.doubleValue()}"
                                 th:style="|width: ${(avance > 100.0 ? 100.0 : avance)}%|"></div>
                        </div>
                        <p>Avance: <strong th:text="${#numbers.formatDecimal(resumen.porcentajeAvance, 1, 'COMMA', 2, 'POINT')} + '%'"></strong></p>

                        <section class="sub-section">
                            <h4>Registrar aporte</h4>
                            <form th:action="@{'/fondos/' + ${resumen.id} + '/aportes'}" th:object="${aporteForm}" method="post" class="form-grid">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <label>
                                    Anio
                                    <input type="number" min="2000" max="2100" th:field="*{anio}" required>
                                    <span class="error" th:if="${#fields.hasErrors('anio')}" th:errors="*{anio}"></span>
                                </label>
                                <label>
                                    Mes
                                    <input type="number" min="1" max="12" th:field="*{mes}" required>
                                    <span class="error" th:if="${#fields.hasErrors('mes')}" th:errors="*{mes}"></span>
                                </label>
                                <label>
                                    Monto
                                    <input type="number" step="0.01" min="0.01" th:field="*{monto}" required>
                                    <span class="error" th:if="${#fields.hasErrors('monto')}" th:errors="*{monto}"></span>
                                </label>
                                <div class="form-actions">
                                    <button type="submit">Registrar</button>
                                </div>
                            </form>
                        </section>

                        <section class="sub-section">
                            <h4>Historial de aportes</h4>
                            <ul class="simple-list" th:if="${!#lists.isEmpty(registrosPorFondo[resumen.id])}">
                                <li th:each="registro : ${registrosPorFondo[resumen.id]}"
                                    th:text="${registro.mes} + '/' + ${registro.anio} + ' — ' + #numbers.formatDecimal(registro.montoAportado, 1, 'COMMA', 2, 'POINT')"></li>
                            </ul>
                            <p th:if="${#lists.isEmpty(registrosPorFondo[resumen.id])}">Aún no hay aportes registrados.</p>
                        </section>

                        <div class="card-actions">
                            <form th:action="@{'/fondos/' + ${resumen.id} + '/eliminar'}" method="post"
                                  onsubmit="return confirm('¿Eliminar fondo?');">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="danger">Eliminar</button>
                            </form>
                        </div>
                    </article>
                </div>
                <p th:if="${#lists.isEmpty(fondosResumen)}">Aún no has creado fondos de ahorro.</p>
            </section>

        </div>
    </div>

</div>
</body>
</html>
