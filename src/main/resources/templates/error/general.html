<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f6fa;
            color: #2d3436;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .error-container {
            background: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 420px;
            text-align: center;
        }
        .error-container h1 {
            margin-bottom: 1rem;
        }
        .error-container a {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 30px;
            background: #0984e3;
            color: #fff;
            text-decoration: none;
        }
        .error-container a:hover {
            background: #74b9ff;
        }
    </style>
</head>
<body>
<main class="error-container">
    <h1>Ups, algo salio mal</h1>
    <p th:text="${mensaje}">Se produjo un error inesperado.</p>
    <p><strong>Ruta:</strong> <span th:text="${ruta}">Desconocida</span></p>
    <a th:href="@{/dashboard}">Volver al tablero</a>
</main>
</body>
</html>
